name: API tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  API_REPOSITORY: propeller-commerce/propeller-sdet-task-Bojana-Aleksovska
  API_REF: fix/api-bugs

jobs:
  build:
    name: Build test project
    runs-on: ubuntu-latest

    steps:
      - name: Checkout test project
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npx tsc --noEmit

  test:
    name: Run API tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout test project
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Checkout API project
        uses: actions/checkout@v4
        with:
          repository: ${{ env.API_REPOSITORY }}
          ref: ${{ env.API_REF }}
          path: api

      - name: Start API and database
        working-directory: api
        run: docker compose up --build -d

      - name: Seed database
        working-directory: api
        run: docker compose run --rm seed

      - name: Run tests
        run: npm test -- --runInBand

      - name: Stop API and database
        if: always()
        working-directory: api
        run: docker compose down --volumes
